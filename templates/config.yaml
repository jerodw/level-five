# Target-repository harness configuration (created by l5-init)
project: {project}
workflow: story-workflow
branch_prefix: story/
permission_mode: acceptEdits
stories_dir: .harness/stories
runs_dir: .harness/runs
logs_dir: .harness/logs
standards_dir: .harness/standards
architecture_docs:
  - docs/ARCHITECTURE.md
test_command: {test_command}
# Bash commands stage agents may run without prompting. Headless agents
# cannot answer permission prompts, so grant exactly what the stages need.
allowed_tools:
  - "Bash(git status:*)"
  - "Bash(git diff:*)"
  - "Bash(git log:*)"
  - "Bash(ls:*)"
  - "Bash(cat:*)"
